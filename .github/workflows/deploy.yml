name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci
      - run: npm run build

      - name: Ensure clerri-preview project exists (fails silently if it already does)
        continue-on-error: true
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages project create clerri-preview --production-branch=main

      - name: Deploy full site to clerri-preview (private mockup URL — has /clerri and /clerri-find)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name clerri-preview

      - name: Strip /clerri and /clerri-find from dist for public production deploy
        run: |
          rm -rf dist/clerri dist/clerri-find
          # Also strip clerri URLs from the sitemap so we don't advertise dead links
          if [ -f dist/sitemap-0.xml ]; then
            sed -i '/<loc>[^<]*\/clerri[^<]*<\/loc>/,/<\/url>/d' dist/sitemap-0.xml || true
          fi

      - name: Deploy stripped site to squatchmarketing-site (clerri URLs now return 404 on squatch domain)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name squatchmarketing-site
